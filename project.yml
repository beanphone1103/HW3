name: 如我所書
options:
  bundleIdPrefix: com.chenbingfeng
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: Sources/如我所書/Info.plist

targets:
  如我所書:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/如我所書
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chenbingfeng.如我所書
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: '"Sources/如我所書/Preview Content"'
    info:
      path: Sources/如我所書/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
